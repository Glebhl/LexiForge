<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glosium localStorage</title>
    <link rel="stylesheet" href="./src/ui/assets/styles/notifications.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f2;
        --surface: #ffffff;
        --surface-soft: #eef2e8;
        --ink: #1f2528;
        --muted: #667177;
        --line: #d9dfd5;
        --accent: #23736f;
        --accent-strong: #135a56;
        --danger: #b23b3b;
        --danger-soft: #fff0ef;
        --focus: #e0b84c;
        --shadow: 0 18px 50px rgba(29, 42, 44, 0.12);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 12px;
        border: 1px solid transparent;
        border-radius: 7px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        gap: 7px;
        transition:
          border-color 120ms ease,
          background 120ms ease,
          color 120ms ease,
          transform 120ms ease;
        white-space: nowrap;
      }

      button:hover {
        border-color: #aab7b4;
      }

      button:active {
        transform: translateY(1px);
      }

      button.primary {
        background: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
      }

      button.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      button.icon {
        width: 38px;
        padding: 0;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        outline: none;
      }

      textarea {
        min-height: 190px;
        font-family: "Cascadia Mono", Consolas, ui-monospace, monospace;
        line-height: 1.5;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      button:focus-visible {
        border-color: var(--focus);
        box-shadow: 0 0 0 3px rgba(224, 184, 76, 0.22);
      }

      .app {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        align-items: end;
        gap: 18px;
        margin-bottom: 18px;
      }

      .title-block h1 {
        margin: 0;
        font-size: clamp(1.75rem, 4vw, 2.625rem);
        letter-spacing: 0;
        line-height: 1;
      }

      .title-block p {
        max-width: 720px;
        margin: 10px 0 0;
        color: var(--muted);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(110px, 1fr));
        min-width: min(430px, 100%);
        gap: 10px;
      }

      .stat {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .stat span {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 0.8125rem;
      }

      .stat strong {
        display: block;
        font-size: 1.375rem;
        line-height: 1.1;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) auto auto auto auto;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .file-button {
        position: relative;
        overflow: hidden;
      }

      .file-button input {
        position: absolute;
        inset: 0;
        cursor: pointer;
        opacity: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
        align-items: start;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .editor {
        position: sticky;
        top: 16px;
        padding: 16px;
      }

      .panel-title {
        margin: 0 0 12px;
        font-size: 1.125rem;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 12px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.8125rem;
        font-weight: 700;
      }

      .form-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 14px;
      }

      .hint {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 0.8125rem;
        line-height: 1.45;
      }

      .status {
        min-height: 22px;
        margin: 12px 0 0;
        color: var(--accent-strong);
        font-size: 0.875rem;
      }

      .status.error {
        color: var(--danger);
      }

      .list-panel {
        overflow: hidden;
      }

      .list-head,
      .entry {
        display: grid;
        grid-template-columns: minmax(140px, 0.65fr) minmax(180px, 1fr) 136px;
        gap: 12px;
      }

      .list-head {
        padding: 13px 16px;
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .entries {
        min-height: 320px;
      }

      .entry {
        align-items: center;
        padding: 14px 16px;
        border-top: 1px solid var(--line);
      }

      .entry-key,
      .entry-value {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .entry-key {
        font-family: "Cascadia Mono", Consolas, ui-monospace, monospace;
        font-weight: 700;
      }

      .entry-value {
        color: var(--muted);
      }

      .entry-actions {
        display: flex;
        justify-content: flex-end;
        gap: 7px;
      }

      .empty {
        display: grid;
        min-height: 320px;
        place-items: center;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 920px) {
        .toolbar {
          grid-template-columns: minmax(180px, 1fr) auto auto;
        }
      }

      @media (max-width: 860px) {
        .topbar,
        .layout,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .editor {
          position: static;
        }

        .stats {
          grid-template-columns: repeat(3, 1fr);
          min-width: 0;
        }
      }

      @media (max-width: 620px) {
        .app {
          width: min(100% - 20px, 1180px);
          padding: 18px 0;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .list-head {
          display: none;
        }

        .entry {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .entry-actions {
          justify-content: flex-start;
          flex-wrap: wrap;
        }

        .form-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title-block">
          <h1>Glosium storage</h1>
          <p>
            Manage localStorage for this origin. Use the OpenRouter key shortcut
            to set the API key used by Glosium.
          </p>
        </div>
        <section class="stats" aria-label="localStorage summary">
          <div class="stat">
            <span>Entries</span>
            <strong id="countStat">0</strong>
          </div>
          <div class="stat">
            <span>Size</span>
            <strong id="sizeStat">0 B</strong>
          </div>
          <div class="stat">
            <span>Visible</span>
            <strong id="visibleStat">0</strong>
          </div>
        </section>
      </header>

      <section class="toolbar" aria-label="Storage tools">
        <input
          id="searchInput"
          type="search"
          placeholder="Search keys and values"
          autocomplete="off"
        />
        <button id="apiKeyButton" class="primary" type="button">
          OpenRouter key
        </button>
        <button id="refreshButton" type="button">Refresh</button>
        <button id="exportButton" type="button">Export JSON</button>
        <label class="file-button">
          <span>Import JSON</span>
          <input id="importInput" type="file" accept="application/json,.json" />
        </label>
        <button id="clearAllButton" class="danger" type="button">
          Clear all
        </button>
      </section>

      <section class="layout">
        <form class="panel editor" id="editorForm">
          <h2 class="panel-title">Entry</h2>
          <div class="field">
            <label for="keyInput">Key</label>
            <input
              id="keyInput"
              type="text"
              placeholder="openrouter_api_key"
              autocomplete="off"
              required
            />
          </div>
          <div class="field">
            <label for="valueInput">Value</label>
            <textarea
              id="valueInput"
              placeholder="Paste a value here"
            ></textarea>
          </div>
          <div class="form-actions">
            <button id="saveButton" class="primary" type="submit">Save</button>
            <button id="resetButton" type="button">Reset</button>
          </div>
          <p class="hint">
            Glosium reads the OpenRouter API key from
            <strong>openrouter_api_key</strong>. The value stays in this browser
            only.
          </p>
          <p
            id="statusLine"
            class="status"
            role="status"
            aria-live="polite"
          ></p>
        </form>

        <section class="panel list-panel" aria-label="localStorage entries">
          <div class="list-head" aria-hidden="true">
            <span>Key</span>
            <span>Value</span>
            <span>Actions</span>
          </div>
          <div id="entries" class="entries"></div>
        </section>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry">
        <div class="entry-key"></div>
        <div class="entry-value"></div>
        <div class="entry-actions">
          <button
            class="icon edit-entry"
            type="button"
            title="Edit"
            aria-label="Edit"
          >
            E
          </button>
          <button
            class="icon copy-entry"
            type="button"
            title="Copy value"
            aria-label="Copy value"
          >
            C
          </button>
          <button
            class="icon delete-entry danger"
            type="button"
            title="Delete"
            aria-label="Delete"
          >
            X
          </button>
        </div>
      </article>
    </template>

    <script type="module">
      const OPENROUTER_KEY = "openrouter_api_key";

      const keyInput = document.getElementById("keyInput");
      const valueInput = document.getElementById("valueInput");
      const searchInput = document.getElementById("searchInput");
      const apiKeyButton = document.getElementById("apiKeyButton");
      const exportButton = document.getElementById("exportButton");
      const importInput = document.getElementById("importInput");
      const clearAllButton = document.getElementById("clearAllButton");
      const refreshButton = document.getElementById("refreshButton");
      const resetButton = document.getElementById("resetButton");
      const editorForm = document.getElementById("editorForm");
      const entriesRoot = document.getElementById("entries");
      const entryTemplate = document.getElementById("entryTemplate");
      const countStat = document.getElementById("countStat");
      const sizeStat = document.getElementById("sizeStat");
      const visibleStat = document.getElementById("visibleStat");
      const statusLine = document.getElementById("statusLine");

      function getEntries() {
        return Object.keys(localStorage)
          .sort((a, b) => a.localeCompare(b, "en"))
          .map((key) => ({ key, value: localStorage.getItem(key) ?? "" }));
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
      }

      function estimateSize(entries) {
        return entries.reduce(
          (total, item) => total + new Blob([item.key, item.value]).size,
          0,
        );
      }

      function setStatus(message, isError = false) {
        statusLine.textContent = message;
        statusLine.classList.toggle("error", isError);
      }

      function createEmptyState(text) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = text;
        return empty;
      }

      function renderEntries() {
        const entries = getEntries();
        const query = searchInput.value.trim().toLowerCase();
        const filtered = entries.filter((item) =>
          `${item.key}\n${item.value}`.toLowerCase().includes(query),
        );

        countStat.textContent = String(entries.length);
        visibleStat.textContent = String(filtered.length);
        sizeStat.textContent = formatBytes(estimateSize(entries));
        entriesRoot.replaceChildren();

        if (entries.length === 0) {
          entriesRoot.append(createEmptyState("localStorage is empty."));
          return;
        }

        if (filtered.length === 0) {
          entriesRoot.append(createEmptyState("No entries match this filter."));
          return;
        }

        const fragment = document.createDocumentFragment();

        filtered.forEach((item) => {
          const node = entryTemplate.content.firstElementChild.cloneNode(true);
          node.dataset.key = item.key;
          node.querySelector(".entry-key").textContent = item.key;
          node.querySelector(".entry-value").textContent = item.value;
          node
            .querySelector(".edit-entry")
            .addEventListener("click", () => editEntry(item.key));
          node
            .querySelector(".copy-entry")
            .addEventListener("click", () => copyEntry(item.value));
          node
            .querySelector(".delete-entry")
            .addEventListener("click", () => deleteEntry(item.key));
          fragment.append(node);
        });

        entriesRoot.append(fragment);
      }

      function editEntry(key) {
        keyInput.value = key;
        valueInput.value = localStorage.getItem(key) ?? "";
        valueInput.focus();
        setStatus(`Editing "${key}"`);
      }

      function editOpenRouterKey() {
        editEntry(OPENROUTER_KEY);
        setStatus(`Paste your OpenRouter key and save "${OPENROUTER_KEY}".`);
      }

      async function copyEntry(value) {
        try {
          await navigator.clipboard.writeText(value);
          setStatus("Value copied.");
        } catch {
          setStatus("Could not copy value.", true);
        }
      }

      function deleteEntry(key) {
        if (!confirm(`Delete "${key}"?`)) return;
        localStorage.removeItem(key);
        renderEntries();
        setStatus(`Deleted "${key}".`);
      }

      editorForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const key = keyInput.value.trim();

        if (!key) {
          setStatus("Enter a key.", true);
          keyInput.focus();
          return;
        }

        try {
          localStorage.setItem(key, valueInput.value);
          renderEntries();
          setStatus(`Saved "${key}".`);
        } catch (error) {
          setStatus(`Could not save: ${error.message}`, true);
        }
      });

      resetButton.addEventListener("click", () => {
        editorForm.reset();
        editOpenRouterKey();
      });

      apiKeyButton.addEventListener("click", editOpenRouterKey);
      searchInput.addEventListener("input", renderEntries);
      refreshButton.addEventListener("click", () => {
        renderEntries();
        setStatus("List refreshed.");
      });

      exportButton.addEventListener("click", () => {
        const payload = Object.fromEntries(
          getEntries().map((item) => [item.key, item.value]),
        );
        const json = JSON.stringify(payload, null, 2);
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `localStorage-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
        setStatus("Export ready.");
      });

      importInput.addEventListener("change", async () => {
        const file = importInput.files?.[0];
        if (!file) return;

        try {
          const data = JSON.parse(await file.text(), {
            context: "localStorage import file",
            title: "Import JSON is invalid",
          });

          if (!data || Array.isArray(data) || typeof data !== "object") {
            throw new Error("JSON must be an object of key-value pairs.");
          }

          Object.entries(data).forEach(([key, value]) => {
            localStorage.setItem(
              key,
              typeof value === "string" ? value : JSON.stringify(value),
            );
          });

          renderEntries();
          setStatus(`Imported ${Object.keys(data).length} entries.`);
        } catch (error) {
          setStatus(`Import failed: ${error.message}`, true);
        } finally {
          importInput.value = "";
        }
      });

      clearAllButton.addEventListener("click", () => {
        const count = localStorage.length;

        if (count === 0) {
          setStatus("Nothing to clear.");
          return;
        }

        if (
          !confirm(
            `Delete all localStorage entries for this origin? Count: ${count}`,
          )
        )
          return;
        localStorage.clear();
        renderEntries();
        editOpenRouterKey();
      });

      addEventListener("storage", () => {
        renderEntries();
        setStatus("Storage changed in another tab.");
      });

      renderEntries();
      editOpenRouterKey();
    </script>
  </body>
</html>
