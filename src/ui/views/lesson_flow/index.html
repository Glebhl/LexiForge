<!doctype html>
<html lang="en">
  <head>
    <link href="../../assets/styles/theme.css" rel="stylesheet" />
    <link href="styles/shell.css" rel="stylesheet" />
    <link href="styles/layout.css" rel="stylesheet" />
    <link href="styles/motion.css" rel="stylesheet" />
    <link href="styles/content.css" rel="stylesheet" />
    <link href="styles/interactive.css" rel="stylesheet" />
    <link href="styles/task-modes.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="lesson-shell">
        <div class="lesson-shell__body">
          <div class="lesson-shell__header">
            <img
              class="lesson-shell__logo"
              src="../../assets/icons/logo.ico"
              alt=""
            />
            <div>
              <p class="lesson-shell__name">Glosium</p>
              <p class="lesson-shell__subtitle">Lesson - Tasks</p>
            </div>
          </div>
          <div class="lesson-progress" id="lessonProgress">
            <div class="lesson-progress__bars" id="progressBars"></div>
            <div class="lesson-progress__text" id="progressText"></div>
          </div>
          <div class="lesson-stage" id="taskStage"></div>
        </div>
        <div class="lesson-shell__footer">
          <button
            class="lesson-button lesson-button--skip"
            id="skip"
            type="button"
          >
            Skip
          </button>
          <button
            class="lesson-button lesson-button--continue"
            id="continue"
            type="button"
            disabled
          >
            Continue
          </button>
        </div>
      </div>
    </main>

    <template id="tpl-question">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Answer the question</p>
          <p class="lesson-task__description">
            Choose an answer for the question below.
          </p>
        </div>
        <div class="lesson-card">
          <p class="lesson-card__label">QUESTION</p>
          <div>
            <p class="question-content"></p>
            <p class="question-paragraph"></p>
          </div>
        </div>
        <div class="lesson-card answer-field">
          <p class="lesson-card__label">YOUR ANSWER</p>
        </div>
      </div>
    </template>

    <template id="tpl-explanation">
      <div class="lesson-task">
        <article class="lesson-card">
          <p class="lesson-card__label">EXPLANATION</p>
          <div class="md-content explanation-content"></div>
        </article>
      </div>
    </template>

    <template id="tpl-loading">
      <div class="lesson-task">
        <article class="lesson-card">
          <p class="lesson-card__label loading-title"></p>
          <p class="loading-message"></p>
        </article>
      </div>
    </template>

    <template id="tpl-filling">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Fill in the gaps</p>
          <p class="lesson-task__description">
            Build the answer using the word bank, or switch to typing if you
            prefer.
          </p>
        </div>
        <div class="lesson-card">
          <div class="task-keyboard__header">
            <span class="lesson-card__label">YOUR ANSWER</span>
            <div class="task-keyboard__mode-switch">
              <button
                class="task-keyboard__mode-button is-active"
                data-mode="word-bank"
                type="button"
              >
                Word Bank
              </button>
              <button
                class="task-keyboard__mode-button"
                data-mode="typing"
                type="button"
              >
                Typing
              </button>
            </div>
          </div>
          <div class="lesson-card task-answer-shell task-answer-shell--filling">
            <p class="lesson-card__label">SENTENCE</p>
            <div class="task-answer task-answer--filling"></div>
          </div>
          <div class="lesson-card task-keyboard-block">
            <p class="lesson-card__label">KEYBOARD</p>
            <div class="task-keyboard"></div>
          </div>
          <div class="task-hint-wrap">
            <div class="task-hint">
              Tip: click a word to place it into the next slot, or hold and drag
              it into any blank. Click a placed word to remove it.
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-translation">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Translate the sentence</p>
          <p class="lesson-task__description">
            Build the answer using the word bank, or switch to typing if you
            prefer.
          </p>
        </div>
        <div class="lesson-card">
          <p class="lesson-card__label">SENTENCE</p>
          <p class="translation-prompt"></p>
        </div>
        <div class="lesson-card">
          <div class="task-keyboard__header">
            <p class="lesson-card__label">YOUR ANSWER</p>
            <div class="task-keyboard__mode-switch">
              <button
                class="task-keyboard__mode-button is-active"
                data-mode="word-bank"
                type="button"
              >
                Word Bank
              </button>
              <button
                class="task-keyboard__mode-button"
                data-mode="typing"
                type="button"
              >
                Typing
              </button>
            </div>
          </div>
          <div
            class="lesson-card task-answer-shell task-answer-shell--translation"
          >
            <p class="lesson-card__label">SENTENCE</p>
            <div class="task-answer-stack">
              <div class="task-answer task-answer--translation"></div>
              <div class="task-answer__typing-wrap">
                <textarea
                  class="task-answer__typing-input"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="Type your translation here..."
                ></textarea>
              </div>
            </div>
          </div>
          <div class="lesson-card task-keyboard-block">
            <p class="lesson-card__label">KEYBOARD</p>
            <div class="task-keyboard"></div>
          </div>
          <div class="task-hint-wrap">
            <div class="task-hint">
              Tip: click to append a word, or hold and drag it into the exact
              position you want. Click a placed word to remove it.
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-matching">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Match the words</p>
          <p class="lesson-task__description">
            Click on the elements on the left and right to make pairs.
          </p>
        </div>
        <div class="lesson-card">
          <span class="lesson-card__label">YOUR ANSWER</span>
          <div class="matching-grid"></div>
        </div>
      </div>
    </template>
  </body>
</html>
