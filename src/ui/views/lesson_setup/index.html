<!doctype html>
<html lang="en">
  <head>
    <link href="../../assets/styles/theme.css" rel="stylesheet" />
    <link href="styles/components.css" rel="stylesheet" />
    <link href="styles/content.css" rel="stylesheet" />
    <link href="styles/layout.css" rel="stylesheet" />
    <link href="styles/interactive.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="lesson-setup-header">
        <div class="brand-row">
          <div class="brand">
            <img
              class="logo"
              src="../../assets/icons/logo.ico"
              alt="logo"
            />
            <div>
              <p class="brand-title">Glosium</p>
              <p class="brand-subtitle" data-i18n="setup.subtitle">
                Lesson planning
              </p>
            </div>
          </div>
          <div class="status-chip-list">
            <a
              class="chip chip--link"
              href="./storage.html"
              target="_blank"
              rel="noopener"
              data-i18n="common.apiKey"
              >API key</a
            >
            <div class="chip" id="lesson-language-chip">
              <img
                class="language-flag"
                id="lesson-language-flag"
                alt="flag"
              />
              <span id="lesson-language-label">EN</span>
            </div>
            <div class="chip" id="deck-amount">Deck: 0 cards</div>
          </div>
        </div>
        <div class="prompt-actions">
          <div class="prompt-field-group">
            <textarea
              class="topic-prompt"
              id="prompt"
              data-i18n-placeholder="setup.promptPlaceholder"
              placeholder='Topic or goal, e.g. "Second Conditional" or "Business meeting vocabulary for B2"'
            ></textarea>
            <div class="hint-line">
              <div class="hint-text" id="hint"></div>
            </div>
          </div>
          <button class="btn btn--go" id="btn-go" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
              <path
                d="M13 6l6 6-6 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
            <span data-i18n="common.generate">Generate</span>
          </button>
          <button class="btn btn--start" id="btn-start" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M8 5v14l12-7-12-7z" fill="currentColor"></path>
            </svg>
            <span data-i18n="common.startLesson">Start lesson</span>
          </button>
        </div>
      </div>
      <div class="mobile-view-tabs" role="tablist">
        <button
          class="mobile-view-tab"
          type="button"
          role="tab"
          aria-selected="false"
          data-setup-tab="cards"
        >
          <span data-i18n="common.cards">Cards</span>
        </button>
        <button
          class="mobile-view-tab"
          type="button"
          role="tab"
          aria-selected="true"
          data-setup-tab="settings"
        >
          <span data-i18n="common.settings">Settings</span>
        </button>
      </div>
      <div class="bottom-shell">
        <div class="settings-shell is-active" data-setup-panel="settings">
          <div class="settings-panel">
            <p class="settings-title" data-i18n="common.settings">Settings</p>
            <div class="settings-content" id="settings-content"></div>
          </div>
        </div>
        <div class="card-grid-shell" data-setup-panel="cards">
          <div class="card-grid-scroll">
            <div class="card-grid" id="cards">
              <p class="card-grid__empty-text" id="cards-empty-text">
                <span data-i18n="setup.emptyCards">
                  I'm Mr. Placeholder. Look at me!
                </span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <template id="card-template">
      <div class="lesson-card lesson-card--vocab">
        <div class="lesson-card__header">
          <div class="lesson-card__term">
            <p class="lesson-card__word"></p>
            <p class="lesson-card__transcription"></p>
          </div>
          <div class="lesson-card__header-aside">
            <div class="lesson-card__actions">
              <button
                class="action-btn"
                type="button"
                aria-label="Edit card"
                data-i18n-aria-label="setup.card.edit"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M12 20h9"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  ></path>
                  <path
                    d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </button>
              <button
                class="action-btn action-btn--remove"
                type="button"
                aria-label="Remove card"
                data-i18n-aria-label="setup.card.remove"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M18 6 6 18M6 6l12 12"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="lesson-card__meta meta-pill--unit">
          <span class="meta-pill">
            <span class="meta-pill__value meta-pill__value--unit"></span>
            <span data-i18n="setup.card.unit">unit</span>
          </span>
          <span class="meta-pill meta-pill--part">
            <span class="meta-pill__value meta-pill__value--part"></span>
            <span data-i18n="setup.card.partOfSpeech">part of speech</span>
          </span>
          <span class="meta-pill meta-pill--level">
            <span class="meta-pill__value meta-pill__value--level"></span>
            <span data-i18n="setup.card.level">level</span>
          </span>
        </div>
        <div class="lesson-card__section lesson-card__section--primary">
          <p class="lesson-card__section-label lesson-card__primary-label"></p>
          <p class="lesson-card__section-value lesson-card__primary"></p>
        </div>
        <div class="lesson-card__section lesson-card__section--secondary">
          <p
            class="lesson-card__section-label lesson-card__secondary-label"
          ></p>
          <p class="lesson-card__section-value lesson-card__secondary"></p>
        </div>
        <div class="lesson-card__section lesson-card__section--example">
          <p class="lesson-card__section-label" data-i18n="setup.card.example">
            EXAMPLE
          </p>
          <p class="lesson-card__example-text lesson-card__example"></p>
        </div>
      </div>
    </template>
  </body>
</html>
