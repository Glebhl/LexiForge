<!DOCTYPE html>
<html>
  <head>
    <link href="../../assets/styles/theme.css" rel="stylesheet" />
    <link href="styles/components.css" rel="stylesheet" />
    <link href="styles/motion.css" rel="stylesheet" />
    <link href="styles/content.css" rel="stylesheet" />
    <link href="styles/layout.css" rel="stylesheet" />
    <link href="styles/interactive.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="lesson-setup-header">
        <div class="brand-row">
          <div class="brand">
            <img class="logo" src="../../assets/icons/logo.ico" />
            <div>
              <p class="brand-title">Glosium</p>
              <p class="brand-subtitle">Vocabulary planning</p>
            </div>
          </div>
          <div class="status-chip-list">
            <div class="chip">
              <img class="language-flag" src="../../assets/icons/flagpack/us.svg" />
              EN
            </div>
            <div class="chip" id="deck-amount">Deck: 0 cards</div>
          </div>
        </div>
        <div class="prompt-actions">
          <div class="prompt-field-group">
            <input
              class="topic-prompt"
              id="prompt"
              placeholder='What do you want to learn today? e.g. "Business meeting vocabulary for B2"'
            />
            <div class="hint-line">
              <div class="hint-text" id="hint"></div>
            </div>
          </div>
          <button class="btn btn--go" id="btn-go" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            Generate
          </button>
          <button class="btn btn--start" id="btn-start" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M8 5v14l12-7-12-7z" fill="currentColor"></path>
            </svg>
            Start lesson
          </button>
        </div>
      </div>
      <div class="bottom-shell">
        <div class="settings-shell">
          <div class="settings-panel">
            <p class="settings-title">
              Settings
            </p>
            <div class="settings-content" id="settings-content"></div>
          </div>
        </div>
        <div class="card-grid-shell">
          <div class="card-grid-scroll">
            <div class="card-grid" id="cards">
              <p class="card-grid__empty-text" id="cards-empty-text">What’s my purpose? You hold flashcards.</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <template id="card-template">
      <div class="lesson-card fade-enter">
        <div class="lesson-card__accent"></div>
        <div class="lesson-card__header">
          <div class="lesson-card__term">
            <p class="lesson-card__word"></p>
            <p class="lesson-card__transcription"></p>
          </div>
          <div class="lesson-card__actions">
            <button class="action-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <button class="action-btn action-btn--remove" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="lesson-card__meta">
          <span class="meta-pill">
            <span class="meta-pill__value meta-pill__value--unit"></span>
            unit
          </span>
          <span class="meta-pill">
            <span class="meta-pill__value meta-pill__value--part"></span>
            part of speech
          </span>
          <span class="meta-pill">
            <span class="meta-pill__value meta-pill__value--level"></span>
            level
          </span>
        </div>
        <div class="lesson-card__section">
          <p class="lesson-card__section-label">TRANSLATION</p>
          <p class="lesson-card__section-value lesson-card__translation"></p>
        </div>
        <div class="lesson-card__section">
          <p class="lesson-card__section-label">MEANING</p>
          <p class="lesson-card__section-value lesson-card__definition"></p>
        </div>
        <div class="lesson-card__section lesson-card__section--example">
          <p class="lesson-card__section-label">EXAMPLE</p>
          <p class="lesson-card__example-text lesson-card__example"></p>
        </div>
      </div>
    </template>

    <script src="../../assets/scripts/pywebview-bridge.js"></script>
    <script src="shared-utils.js"></script>
    <script src="lesson-shell.js"></script>
  </body>
</html>
