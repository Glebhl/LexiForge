<!doctype html>

<html>
  <head>
    <link href="Inter.ttf" rel="stylesheet" />

    <link href="darkscroll.css" rel="stylesheet" />
    <link href="general.css" rel="stylesheet" />
    <link href="mainbar.css" rel="stylesheet" />
    <link href="sliding-animations.css" rel="stylesheet" />
    <link href="keyboard.css" rel="stylesheet" />
    <link href="explanation.css" rel="stylesheet" />
    <link href="matching.css" rel="stylesheet" />
    <link href="translation.css" rel="stylesheet" />
    <link href="filling.css" rel="stylesheet" />
    <!-- <link href="filling.css" rel="stylesheet"> -->

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  </head>
  <body>
    <main>
      <div class="lesson-shell">
        <div class="lesson-shell__body">
          <div class="lesson-shell__header">
            <img class="lesson-shell__logo" src="../logo.jpg" />
            <div>
              <p class="lesson-shell__name">LexiForge</p>
              <p class="lesson-shell__subtitle">Lesson · Tasks</p>
            </div>
          </div>
          <div class="lesson-progress">
            <div class="lesson-progress-bar">
              <div class="lesson-progress__fill" id="progressFill"></div>
            </div>
            <div class="lesson-progress__text" id="progressText"></div>
          </div>
          <div class="lesson-stage" id="taskStage">
            <!-- Mainscreen content -->
            <!-- Content END -->
          </div>
        </div>
        <div class="lesson-shell__footer">
          <button class="lesson-button lesson-button--skip" id="skip">
            Skip
          </button>
          <button
            class="lesson-button lesson-button--continue"
            id="continue"
            disabled
          >
            Continue
          </button>
        </div>
      </div>
    </main>

    <!-- QUESTION task START -->
    <template id="tpl-question">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Answer the question</p>
          <p class="lesson-task__description">
            Choose an answer for the question below.
          </p>
        </div>
        <div class="lesson-card">
          <p class="lesson-card__label">QUESTION</p>
          <div>
            <p class="question-content"></p>
            <p class="question-paragraph"></p>
          </div>
        </div>
        <div class="lesson-card answer-field">
          <p class="lesson-card__label">YOUR ANSWER</p>
        </div>
      </div>
    </template>
    <!-- QUESTION task END -->

    <!-- EXPLANATION task START -->
    <template id="article-template">
      <article class="lesson-card">
        <div class="lesson-card__label"></div>
        <div class="md-content"></div>
      </article>
    </template>
    <template id="tpl-explanation">
      <div class="lesson-task"></div>
    </template>
    <!-- EXAMPLE task END -->

    <!-- FILLING task START -->
    <template id="tpl-filling">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Fill in the gaps</p>
          <p class="lesson-task__description">
            Build the answer using the word bank, or switch to typing if you
            prefer.
          </p>
        </div>
        <div class="lesson-card">
          <span class="lesson-card__label">YOUR ANSWER</span>
          <div class="lesson-card task-answer-shell task-answer-shell--filling">
            <p class="lesson-card__label">SENTENCE</p>
            <div class="task-answer task-answer--filling"></div>
          </div>
          <div class="lesson-card">
            <p class="lesson-card__label">KEYBOARD</p>
            <div class="task-keyboard"></div>
          </div>
          <div class="task-hint-wrap">
            <div class="task-hint">
              Tip: click a word to place it into the next slot. Click a placed
              word to remove it.
            </div>
          </div>
        </div>
      </div>
    </template>
    <template id="blank-template">
      <span class="task-blank"></span>
    </template>

    <!-- TRANSLATION task START -->
    <template id="tpl-translation">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Translate the sentence</p>
          <p class="lesson-task__description">
            Build the answer using the word bank, or switch to typing if you
            prefer.
          </p>
        </div>
        <div class="lesson-card">
          <p class="lesson-card__label">SENTENCE</p>
          <p class="translation-prompt"></p>
        </div>
        <div class="lesson-card">
          <div class="task-keyboard__header">
            <p class="lesson-card__label">YOUR ANSWER</p>
            <div class="task-keyboard__mode-switch">
              <button class="task-keyboard__mode-button is-active">
                Word bank
              </button>
              <button class="task-keyboard__mode-button">Typing</button>
            </div>
          </div>
          <div
            class="lesson-card task-answer-shell task-answer-shell--translation"
          >
            <p class="lesson-card__label">SENTENCE</p>
            <div class="task-answer task-answer--translation"></div>
          </div>
          <div class="lesson-card">
            <p class="lesson-card__label">KEYBOARD</p>
            <div class="task-keyboard"></div>
          </div>
          <div class="task-hint-wrap">
            <div class="task-hint">
              Tip: click a word to place it into the next slot. Click a placed
              word to remove it.
            </div>
          </div>
        </div>
      </div>
    </template>
    <template id="key-template">
      <div class="task-key"></div>
    </template>
    <!-- TRANSLATION task END -->

    <!-- MATCHING task START-->
    <template id="tpl-matching">
      <div class="lesson-task">
        <div>
          <p class="lesson-task__title">Match the words</p>
          <p class="lesson-task__description">
            Click on the elements on the left and right to make pairs.
          </p>
        </div>
        <div class="lesson-card">
          <span class="lesson-card__label">YOUR ANSWER</span>
          <div class="matching-grid">
            <div
              class="matching-grid__column matching-grid__column--left"
            ></div>
            <div
              class="matching-grid__column matching-grid__column--right"
            ></div>
          </div>
        </div>
      </div>
    </template>
    <template id="item-template">
      <button class="task-choice is-idle"></button>
    </template>
    <!-- MATCHING tast END -->

    <script>
      // Global link to Python backend
      let backend = null;

      // Channel initialization
      new QWebChannel(qt.webChannelTransport, function (channel) {
        backend = channel.objects.backend;
      });
    </script>
    <script src="backend-common.js"></script>
    <script src="backend-explanation.js"></script>
    <script src="backend-matching.js"></script>
    <script src="backend-translation.js"></script>
    <script src="backend-filling.js"></script>
    <script src="backend-question.js"></script>
  </body>
</html>
